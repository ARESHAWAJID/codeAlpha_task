<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="style2.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <title>Image Gallery</title>
</head>
<body>
    <header>
        <div class="head-section"><h1>Alpha Image Gallery</h1></div>
       
    </header>

            <img src="./images/image1.jpg" alt="Full Image" id="full-Image">

            <button id="prev-button">&#8249;</button>
            <button id="next-button">&#8250;</button>
    </div>
    <div class="gallery">
        <div class="gallery_item">
            <img src="./images/image1.jpg" class="gallery-image " alt="Image 1">
        </div>
        <div class="gallery_item">                                  
            <img src="./images/image2.jpg" class="gallery-image" alt="Image 2">
        </div>
        <div class="gallery_item">
            <img src="./images/image3.jpg" class="gallery-image" alt="Image 3">
        </div>
        <div class="gallery_item">
            <img src="./images/image4.jpg" class="gallery-image" alt="Image 4">
        </div>
        <div class="gallery_item">
            <img src="./images/image5.jpg" class="gallery-image" alt="Image 5">
        </div>
        <div class="gallery_item">
            <img src="./images/image6.jpg" class="gallery-image" alt="Image 6">
        </div>
        <div class="gallery_item">
            <img src="./images/image7.jpg" class="gallery-image" alt="Image 7">
        </div>
        <div class="gallery_item">
            <img src="./images/image8.jpg" class="gallery-image" alt="Image 8">
        </div>
        <div class="gallery_item">
            <img src="./images/image9.jpg" class="gallery-image" alt="Image 9">
        </div>
        <div class="gallery_item">
            <img src="./images/image10.jpg" class="gallery-image" alt="Image 10">
        </div>
        <div class="gallery_item">
            <img src="./images/image11.jpg" class="gallery-image" alt="Image 11">
        </div>
        <div class="gallery_item">
            <img src="./images/image12.jpg" class="gallery-image" alt="Image 12">
        </div>
        </div>
   <footer>
   
        <p>&copy; Alpha Image Gallery. All rights reserved.</p>

   </footer>

<script src="index.js"></script>

 </html>
